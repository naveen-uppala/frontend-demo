name: Frontend CI workflow

on:
  workflow_dispatch:
  # push:
  #   branches: [ "main" ]

permissions:
  contents: read
  id-token: write
  actions: read
  security-events: write  
  

jobs:

  SAST:
    name: CodeQL Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write   # required to upload results to the Security tab
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'     # change to match your project (18, 20, 22, etc.)
          cache: 'npm'           # use 'yarn' or 'pnpm' if applicable

      - name: Install dependencies
        run: npm ci              # use 'yarn install --frozen-lockfile' or 'pnpm install --frozen-lockfile' if applicable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      # Autobuild is optional for JS/TS — CodeQL can analyze without a build step.
      # Keep it only if your project has a build (TypeScript compilation, bundler, etc.)
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"


  build:
    runs-on: self-hosted
    env:
      ECR_REPOSITORY: frontend
      IMAGE_TAG: ${{ github.run_number }}
    
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Export ECR registry to env
        run: echo "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV        

      - name: Build Docker image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

      - name: Push Docker image to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG        
          

